# Layer-1 comparison cases: operation=is_increasing / is_decreasing / is_stable.
# These are directional claims with no explicit number (claimed_value/unit omitted → null).
# Uang Kartal 2026 (miliar Rp): Jan 1.156.846,7184 | Feb 1.159.800,0482 | Mar 1.206.116,3638 (rising)

- id: is_increasing_kartal_entailed
  description: "Uang Kartal genuinely rises Jan→Feb→Mar 2026"
  table:
    title: "Uang Beredar dan faktor-faktor yang mempengaruhinya"
    unit: "Miliar Rp"
    data:
      - {label: "Uang Kartal di Luar Bank Umum dan BPR", year: 2026, month: Jan, value: 1156846.7184}
      - {label: "Uang Kartal di Luar Bank Umum dan BPR", year: 2026, month: Feb, value: 1159800.0482}
      - {label: "Uang Kartal di Luar Bank Umum dan BPR", year: 2026, month: Mar, value: 1206116.3638}
  fact:
    operation: is_increasing
    context_quote: "uang kartal terus meningkat dari Januari hingga Maret 2026"
    periods:
      - {metric_label: "Uang Kartal di Luar Bank Umum dan BPR", year: 2026, month: Jan}
      - {metric_label: "Uang Kartal di Luar Bank Umum dan BPR", year: 2026, month: Feb}
      - {metric_label: "Uang Kartal di Luar Bank Umum dan BPR", year: 2026, month: Mar}
  expected:
    verdict: Entailed

