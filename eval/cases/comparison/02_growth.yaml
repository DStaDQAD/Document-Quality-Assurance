      - {label: "Uang Beredar Luas(M2)", year: 2026, month: Apr, value: 10253651.888}
  fact:
    operation: yoy_growth
    unit: "persen_yoy"
    claimed_value: 9.2
    context_quote: "M2 tumbuh 9,2% (yoy)"
    periods:
      - {metric_label: "Uang Beredar Luas(M2)", year: 2026, month: Apr}
