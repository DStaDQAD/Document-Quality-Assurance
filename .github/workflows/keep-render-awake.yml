name: Keep Render awake

on:
  schedule:
    # Render's free tier sleeps after 15 min with no inbound traffic - ping well under that.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: curl -sf "${{ vars.RENDER_APP_URL }}/health"
